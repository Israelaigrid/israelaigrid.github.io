  REAL-DATA INSTANCE: entity://M/beer-sheva/israel-ai-grid — Company Zero.
  ============================================================================
  Identical render engine to compact.html (same CSS, same window.IAIGCompact.
  render(businessData) function — copy-paste, not forked). ONLY the
  businessData JSON at the bottom differs. meta.demo = false — no ribbon.

  businessData below is copied VERBATIM from docs/passport-template/
  israel-ai-grid.html's own businessData (built from entities +
  external_identifier + trust_score + field_provenance + booking_slots +
  salon_services in PostgreSQL `iaig`, cross-checked with direct SELECTs on
  2026-07-08). Nothing here is guessed or re-derived except:
    identity.tags — additive optional field (see compact.html's header
    comment). Here it is a straight re-split of the ALREADY-APPROVED
    identity.categoryTag string ("M · שירותים מקצועיים (טכנולוגיה) · באר שבע")
    into chip form — no new fact, same source string.
  identity.shortId is intentionally OMITTED (unlike the pizza demo's
  "IL-REST-000452") because no such government-issued short code exists for
  this entity in the DB — inventing one would violate the project's
  no-invented-data rule. The render engine falls back to showing the real
  entity://... id instead (see compact.html renderHeader: `id.shortId ||
  id.entityId`).

  Fields that could NOT be verified from the DB (same list as
  israel-ai-grid.html): a distinct verification_record timestamp (falls back
  to entities.created_at), a friendly owner name (only owner_entity=
  user://972509000226 exists), any uploaded logo/cover asset, Google review
  data, 2FA status (st:"unknown", excluded from both the gaps and
  opportunities buckets by design — "unknown" is never presented as a
  negative). See the SCORE FORMULA comment at the bottom for how ai/
  automation/marketing (56/55/15) were derived; digital=71 is verbatim from
  scripts/generate_passport.compute_digital_score().
  ============================================================================
-->

    if(v >= 45) return "בינוני";

    return "נמוך";
  }

  /* ---------- gauge (thin high-contrast ring) --------------------------- */
  function gauge(value, label, color){
    var v = (value === null || value === undefined) ? 0 : Math.max(0, Math.min(100, value));

    var C = 2 * Math.PI * R;
    var offset = C * (1 - v/100);
    return '' +

    "tech.crm":"חברו מערכת CRM", "tech.aiBotWhatsapp":"הוסיפו בוט AI בוואטסאפ",
    "retention.newsletter":"הפעילו ניוזלטר תקופתי", "retention.smsMarketing":"הוסיפו ערוץ SMS למבצעים",
    "retention.club":"הקימו מועדון לקוחות", "retention.points":"הוסיפו תוכנית נקודות",
    "readiness.apiReady":"חשפו API לקריאות מכונה (agent-ready)",
    "readiness.commerceReady":"השלימו יכולת סליקה/מסחר מלאה"
  };

  /* CRITICAL_SET — the fixed list of "you're not reachable/trustworthy yet"
     keys. Everything else that is st:"no"/"mid" is a growth opportunity. */
  var CRITICAL_SET = {
    "contact.gps":1, "contact.email":1, "contact.whatsapp":1, "contact.phone":1,
    "contact.hours":1, "contact.booking":1,
    "security.ssl":1, "security.twoFA":1, "security.backups":1, "security.privacyPolicy":1, "security.terms":1,
    "presence.website":1, "presence.googleBusiness":1, "presence.whatsappBusiness":1,
    "tech.paymentSystem":1, "tech.orderSystem":1,
    "branding.cover":1, "branding.logoAsset":1
  };

  /* ---------- gaps / opportunities engine -------------------------------- */
  function collectIssues(data){
    var gaps = [], opps = [];
    function scan(sectionKey, metaMap, obj, fallbackLabel){
      if(!obj) return;
      Object.keys(obj).forEach(function(k){
        var item = obj[k];
        if(!item || item.relevant === false) return;
        if(item.st !== "no" && item.st !== "mid") return;
        var meta = metaMap && metaMap[k];
        var label = (meta && meta.label) || fallbackLabel(k) || k;
        var iconName = (meta && meta.icon) || "circle-alert";
        var entry = {section:sectionKey, key:k, label:label, icon:iconName, st:item.st};
        var ck = sectionKey+"."+k;
        if(item.st === "no" && CRITICAL_SET[ck]){
          gaps.push(entry);
        } else {
          opps.push(entry);
        }
      });
    }
    scan("contact", CONTACT_META, data.contact, function(k){ return k; });
    scan("presence", PRESENCE_META, data.presence, function(k){ return k; });
    scan("sales", SALES_META, data.sales, function(k){ return k; });
    scan("tech", TECH_META, data.tech, function(k){ return k; });
    scan("security", {
      ssl:{label:"SSL", icon:"shield-check"}, twoFA:{label:"אימות דו-שלבי", icon:"shield"},
      backups:{label:"גיבויים", icon:"shield"}, privacyPolicy:{label:"מדיניות פרטיות", icon:"shield"},
      terms:{label:"תנאי שימוש", icon:"shield"}
    }, data.security, function(k){ return k; });
    scan("retention", {
      club:{label:"מועדון לקוחות", icon:"crown"}, points:{label:"נקודות", icon:"percent"},
      coupons:{label:"קופונים", icon:"percent"}, vip:{label:"VIP", icon:"crown"},
      newsletter:{label:"ניוזלטר", icon:"send"}, smsMarketing:{label:"SMS", icon:"send"},
      waMarketing:{label:"דיוור WhatsApp", icon:"message-circle"}
    }, data.retention, function(k){ return k; });
    scan("readiness", {
      apiReady:{label:"API Ready", icon:"zap"}, commerceReady:{label:"Commerce Ready", icon:"credit-card"},
      aiReady:{label:"AI Ready", icon:"bot"}, machineReady:{label:"Machine Ready", icon:"cpu"}
    }, {
      apiReady: data.readiness && data.readiness.apiReady,
      commerceReady: data.readiness && data.readiness.commerceReady,
      aiReady: data.readiness && data.readiness.aiReady,
      machineReady: data.readiness && data.readiness.machineReady
    }, function(k){ return k; });
    if(data.branding){
      if(data.branding.cover && (data.branding.cover.relevant !== false)){
        var entry = {section:"branding", key:"cover", label:"תמונת שער", icon:"shield", st:data.branding.cover.st};
        if(data.branding.cover.st === "no") gaps.push(entry);
      }
      if(data.branding.logoAsset && (data.branding.logoAsset.relevant !== false)){
        var entry2 = {section:"branding", key:"logoAsset", label:"לוגו", icon:"shield", st:data.branding.logoAsset.st};
        if(data.branding.logoAsset.st === "no") gaps.push(entry2);
      }
    }
    return {gaps:gaps, opps:opps};
  }

          '<span class="text-[11px] text-slate-300 leading-tight">'+esc(text)+'</span>' +
        '</div>';
      }).join("")+'</div>';

    var body = list.length

  /* ============================================================================

  function render(data){
    var app = document.getElementById("app");

    var html = '<div class="w-full h-full flex flex-col px-6 py-4 gap-4 max-w-[1760px] mx-auto">';

      html += '<div class="fixed top-3 -start-14 z-50 rotate-[-45deg] bg-gradient-to-br from-[#d4a72c] to-[#8a6d1c] text-[#241a02] font-extrabold text-[11px] tracking-wide px-16 py-1 shadow-lg">דוגמה להמחשה</div>';

    html += renderHeader(data);

    html += '<div class="grid grid-cols-12 gap-4 flex-1 min-h-0">';

    app.innerHTML = html;
    document.title = (data.identity && data.identity.name ? data.identity.name + " — " : "") + "דרכון דיגיטלי לעסק";
  }

  window.IAIGCompact = { render: render, designTokens: designTokens };
})();
